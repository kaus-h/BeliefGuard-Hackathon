name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  extension:
    name: Compile and test VS Code extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BeliefGuard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BeliefGuard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Benchmark smoke test
        run: npm run benchmark -- --repo . --iterations 3 --scenarios-dir benchmarks/scenarios
